server {
    listen 80;
    server_name localhost;

    # Laravel public directory is the web root
    root /var/www/html/public;
    index index.php index.html;

    # ─────────────────────────────────────────
    # Main location — try files then route to Laravel
    # ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─────────────────────────────────────────
    # PHP-FPM — pass .php files to app container
    # ─────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Deny access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }

    # Static asset caching
    location ~* \.(jpg|jpeg|gif|png|ico|css|js|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ─────────────────────────────────────────
    # Handle 502 Bad Gateway during container startup
    # ─────────────────────────────────────────
    error_page 502 = @startup;

    location @startup {
        default_type text/html;
        return 502 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>GoodPanda is starting...</title><style>body { font-family: system-ui, sans-serif; text-align: center; padding: 4rem 2rem; background: #fdfdfd; color: #333; } h1 { color: #d32f2f; } .loader { border: 4px solid #f3f3f3; border-top: 4px solid #d32f2f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 2rem auto; } @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style></head><body><h1>GoodPanda is starting up...</h1><p>The application container is installing dependencies and building assets. This process may take a few minutes on the first run.</p><div class="loader"></div><p>Please wait, this page will automatically refresh.</p><script>setTimeout(() => window.location.reload(), 5000);</script></body></html>';
    }

    # Logging
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}