; ─────────────────────────────────────────
; GoodPanda — Custom PHP settings
; ─────────────────────────────────────────

[PHP]
; Increase limits for file uploads and processing
upload_max_filesize = 20M
post_max_size = 25M
max_execution_time = 300
max_input_time = 300
memory_limit = 256M

; Error display (overridden by APP_DEBUG in Laravel)
display_errors = Off
log_errors = On
error_log = /var/log/php_errors.log

; Timezone (change to your local zone if needed)
date.timezone = Asia/Dhaka