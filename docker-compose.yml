services:

  # ─────────────────────────────────────────
  # PHP-FPM Application Container
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Docker/php/Dockerfile
    container_name: goodpanda_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./Docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - goodpanda_network
    depends_on:
      - sqlserver
    environment:
      - APP_ENV=${APP_ENV:-local}
  # ─────────────────────────────────────────
  # Nginx Web Server
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: goodpanda_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./Docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - goodpanda_network
    depends_on:
      - app

  # ─────────────────────────────────────────
  # Microsoft SQL Server 2022
  # Connect via SSMS: localhost,1433
  # ─────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: goodpanda_sqlserver
    restart: unless-stopped
    ports:
      - "1433:1433"           # Connect SSMS to localhost,1433
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${DB_PASSWORD:-GoodPanda@2025!}
      MSSQL_PID: Developer    # Free Developer edition
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - goodpanda_network

  # ─────────────────────────────────────────
  # Node.js for Vite / npm run dev
  # ─────────────────────────────────────────
  node:
    image: node:20-alpine
    container_name: goodpanda_node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"           # Vite HMR port
    networks:
      - goodpanda_network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    profiles:
      - dev                   # Only starts with: docker compose --profile dev up

# ─────────────────────────────────────────
# Named volumes (data persists across restarts)
# ─────────────────────────────────────────
volumes:
  sqlserver_data:
    driver: local

# ─────────────────────────────────────────
# Internal network
# ─────────────────────────────────────────
networks:
  goodpanda_network:
    driver: bridge